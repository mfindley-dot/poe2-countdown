<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 320px;
      background: #0c0a09;
      color: #cbd5e1;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 15px;
      box-sizing: border-box;
      border: 1px solid #c5a880;
    }
    
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px dashed rgba(197, 168, 128, 0.25);
      padding-bottom: 8px;
      margin-bottom: 12px;
    }
    
    .title {
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: bold;
      color: #ffd700;
      margin: 0;
      letter-spacing: 1px;
    }
    
    .badge {
      background: #ef4444;
      color: white;
      font-size: 0.6rem;
      font-weight: bold;
      padding: 2px 5px;
      border-radius: 2px;
      animation: pulse 1.5s infinite;
    }
    
    .field-group {
      margin-bottom: 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    label {
      font-size: 0.7rem;
      color: #a2a1a0;
      font-weight: bold;
    }
    
    input {
      background: #1c1917;
      border: 1px solid rgba(197, 168, 128, 0.25);
      color: #f8fafc;
      padding: 6px 8px;
      border-radius: 4px;
      font-size: 0.72rem;
      outline: none;
      transition: all 0.2s ease;
    }
    
    input:focus {
      border-color: #ffd700;
      box-shadow: 0 0 4px rgba(255, 215, 0, 0.2);
    }
    
    .btn-sync {
      width: 100%;
      background: linear-gradient(180deg, #ffd700 0%, #c5a880 100%);
      border: 1px solid #ffd700;
      color: #0c0a09;
      padding: 8px;
      font-size: 0.8rem;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.5);
      transition: all 0.2s ease;
      margin-top: 5px;
    }
    
    .btn-sync:hover {
      filter: brightness(1.15);
      box-shadow: 0 0 8px rgba(255, 215, 0, 0.4);
    }
    
    .log-box {
      margin-top: 12px;
      background: #090705;
      border: 1px solid rgba(197, 168, 128, 0.15);
      padding: 8px;
      border-radius: 4px;
      font-size: 0.65rem;
      font-family: monospace;
      color: #a2a1a0;
      max-height: 80px;
      overflow-y: auto;
      line-height: 1.4;
    }
    
    .success {
      color: #10b981;
      font-weight: bold;
    }
    
    .error {
      color: #ef4444;
      font-weight: bold;
    }
    
    .preview-canvas {
      display: none;
      width: 100%;
      margin-top: 10px;
      border: 1px solid rgba(197, 168, 128, 0.2);
      border-radius: 4px;
    }

    /* V2.0 Toggle and Appraisal styles */
    .mode-toggle {
      display: flex;
      background: #1c1917;
      border: 1px solid rgba(197, 168, 128, 0.25);
      border-radius: 4px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    
    .toggle-btn {
      flex: 1;
      background: none;
      border: none;
      color: #a2a1a0;
      font-family: 'Outfit', sans-serif;
      font-size: 0.72rem;
      font-weight: bold;
      padding: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .toggle-btn.active {
      background: linear-gradient(180deg, #ffd700 0%, #c5a880 100%);
      color: #0c0a09;
    }
    
    .paste-area {
      background: #090705;
      border: 1px solid rgba(197, 168, 128, 0.2);
      border-radius: 4px;
      color: #f8fafc;
      width: 100%;
      height: 65px;
      font-family: monospace;
      font-size: 0.65rem;
      padding: 6px;
      box-sizing: border-box;
      outline: none;
      resize: none;
      margin-top: 4px;
    }
    
    .paste-area:focus {
      border-color: #ffd700;
    }
    
    .appraisal-card {
      display: none;
      background: #090705;
      border: 1px solid #c5a880;
      border-radius: 4px;
      padding: 10px;
      margin-top: 10px;
      font-family: 'Inter', sans-serif;
      box-shadow: 0 4px 10px rgba(0,0,0,0.6);
    }
    
    .appraisal-header {
      text-align: center;
      border-bottom: 1px solid rgba(197, 168, 128, 0.2);
      padding-bottom: 6px;
      margin-bottom: 6px;
    }
    
    .appraisal-title {
      font-family: 'Outfit', sans-serif;
      font-size: 0.85rem;
      font-weight: bold;
      color: #af6025;
      margin: 0;
    }
    
    .appraisal-base {
      font-size: 0.7rem;
      color: #a2a1a0;
      margin: 1px 0 0 0;
    }
    
    .appraisal-mods {
      font-size: 0.65rem;
      color: #8892b0;
      line-height: 1.35;
      padding: 4px 0;
      border-bottom: 1px solid rgba(197, 168, 128, 0.15);
      text-align: left;
    }
    
    .appraisal-price-tag {
      text-align: center;
      margin-top: 8px;
      padding: 6px;
      background: rgba(197,168,128,0.05);
      border: 1px solid rgba(197,168,128,0.15);
      border-radius: 3px;
    }
    
    .appraisal-price-val {
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      font-weight: bold;
      color: #ffd700;
      display: block;
    }
    
    .appraisal-culling-logs {
      font-size: 0.55rem;
      color: #a2a1a0;
      display: block;
      margin-top: 2px;
    }
    
    .appraisal-btn-sync {
      width: 100%;
      background: #10b981;
      border: 1px solid #10b981;
      color: white;
      font-family: 'Outfit', sans-serif;
      font-size: 0.75rem;
      font-weight: bold;
      padding: 6px;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.2s ease;
    }
    
    .appraisal-btn-sync:hover {
      filter: brightness(1.15);
    }
  </style>
  <title>GLG Stash Sync</title>
</head>
<body>

  <div class="header">
    <span class="title">🔮 GLG STASH SCANNER</span>
    <span class="badge">V2.0</span>
  </div>

  <!-- Dual Mode Selector Switch -->
  <div class="mode-toggle">
    <button class="toggle-btn active" id="btnModeStash">🪙 STASH TAB SYNC</button>
    <button class="toggle-btn" id="btnModeAppraiser">🔍 ITEM APPRAISER</button>
  </div>

  <div class="field-group">
    <label for="geminiKey">GEMINI API KEY:</label>
    <input type="password" id="geminiKey" placeholder="Paste Gemini API Key from Google AI Studio">
  </div>

  <div class="field-group">
    <label for="dreamloKey">DREAMLO PRIVATE KEY:</label>
    <input type="password" id="dreamloKey" placeholder="Paste Dreamlo Private Key">
  </div>

  <!-- Stash Tab Mode Section -->
  <div id="sectionStash">
    <button class="btn-sync" id="btnSync">🔮 CAPTURE & SYNC STASH</button>
  </div>

  <!-- Item Appraiser Mode Section -->
  <div id="sectionAppraiser" style="display: none;">
    <div class="field-group">
      <label for="clipboardPaste">PASTED ITEM STATS (CTRL + V):</label>
      <textarea id="clipboardPaste" class="paste-area" placeholder="Hover item in-game, press Ctrl + C, then paste here!"></textarea>
    </div>
    <button class="btn-sync" id="btnAppraise" style="margin-top: 0;">🔍 APPRAISE CLIPBOARD ITEM</button>
  </div>

  <div class="log-box" id="logBox">
    Status: Idle. Select mode or click button.
  </div>

  <!-- Live PoE Styled Appraisal Card -->
  <div class="appraisal-card" id="appraisalCard">
    <div class="appraisal-header">
      <h4 class="appraisal-title" id="appTitle">Dread Loop</h4>
      <p class="appraisal-base" id="appBase">Topaz Ring</p>
    </div>
    <div class="appraisal-mods" id="appMods">
      <!-- explicit stats -->
    </div>
    <div class="appraisal-price-tag">
      <span class="appraisal-price-val" id="appPrice">35 Chaos Orbs</span>
      <span class="appraisal-culling-logs" id="appCullingLogs">Pricing model baseline: 1 Divine = 150 Chaos.</span>
    </div>
    <button class="appraisal-btn-sync" id="btnSyncItem">💍 SYNC ITEM TO WEBSITE</button>
  </div>
  
  <canvas id="previewCanvas" class="preview-canvas"></canvas>
  <video id="tempVideo" style="display:none;"></video>

  <script src="popup.js"></script>
</body>
</html>
